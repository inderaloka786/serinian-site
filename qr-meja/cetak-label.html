<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Label QR Meja — Seri Nian</title>
<style>
  @page { size: A4; margin: 10mm; }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif}
  body{background:#f2f2f2}
  .sheet{
    display:grid;grid-template-columns:repeat(3,1fr);gap:6mm;
    max-width:210mm;margin:0 auto;padding:6mm;
  }
  .label{
    border:2px dashed #999;border-radius:10px;padding:8mm 4mm;
    text-align:center;background:#fff;
    break-inside:avoid;page-break-inside:avoid;
  }
  .label .brand{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#C8102E;font-weight:800;margin-bottom:4px}
  .label img{width:100%;max-width:45mm;height:auto;margin:4px auto}
  .label .meja{font-size:20px;font-weight:900;color:#2B1A14;margin-top:4px}
  .label .cta{font-size:10px;color:#6E5A50;margin-top:2px}
  @media print{
    body{background:#fff}
    .no-print{display:none}
  }
</style>
</head>
<body>

<div class="no-print" style="text-align:center;padding:16px">
  <button onclick="window.print()" style="padding:10px 24px;font-size:14px;font-weight:700;border-radius:8px;border:none;background:#C8102E;color:#fff;cursor:pointer">Cetak Semua Label</button>
  <p style="margin-top:8px;color:#666;font-size:13px">25 label QR meja, 3 setiap baris. Cetak atas kertas A4, potong ikut garis putus, laminate kalau boleh.</p>
</div>

<div class="sheet" id="sheet"></div>

<script>
const TOTAL = 25;
const sheet = document.getElementById('sheet');
let html = '';
for (let i = 1; i <= TOTAL; i++) {
  const n = String(i).padStart(2, '0');
  html += `
    <div class="label">
      <div class="brand">Seri Nian</div>
      <img src="meja-${n}.png" alt="QR Meja ${i}">
      <div class="meja">MEJA ${i}</div>
      <div class="cta">Imbas untuk lihat menu &amp; order</div>
    </div>`;
}
sheet.innerHTML = html;
</script>

</body>
</html>
