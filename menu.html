:root{

*{margin:0;padding:0;box-sizing:border-box}

}
.nav-in{display:flex;align-items:center;justify-content:space-between;height:74px;max-width:900px;margin:0 auto;padding:0 24px}

.logo span{color:var(--merah)}
.back{

}

.hero-menu{
  text-align:center;padding:56px 24px 30px;

}
.hero-menu .eyebrow{
  font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:var(--merah);font-weight:800;
}
.hero-menu h1{font-size:clamp(2.1rem,6vw,3.2rem);margin-top:12px}
.hero-menu h1 em{font-style:italic;font-weight:700;color:var(--merah)}
.hero-menu p{color:var(--ink-soft);margin-top:12px}

.jump-nav{
  display:flex;gap:10px;flex-wrap:wrap;justify-content:center;padding:0 24px 40px;max-width:900px;margin:0 auto;
}
.jump-nav a{
  text-decoration:none;font-size:.82rem;font-weight:800;padding:9px 18px;border-radius:999px;
  border:2px solid rgba(43,26,20,.12);color:var(--ink-soft);transition:border-color .2s,color .2s;
}
.jump-nav a:hover{border-color:var(--merah);color:var(--merah)}

.top-kat{
  font-family:'Fraunces',serif;font-weight:900;font-size:2.1rem;margin:64px 0 4px;
  color:var(--merah);display:flex;align-items:center;gap:16px;scroll-margin-top:90px;
}
.top-kat:first-of-type{margin-top:10px}
.top-kat::before{content:"";width:34px;height:4px;background:var(--emas);border-radius:4px;flex:none}
.top-kat .n{font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-soft);font-weight:800;margin-left:6px}
h3.kat{
  font-family:'Fraunces',serif;font-weight:800;font-size:1.2rem;margin:30px 0 6px 20px;
  display:flex;align-items:center;gap:14px;color:var(--ink);
}
h3.kat::after{content:"";flex:1;height:1px;background:rgba(43,26,20,.12);border-radius:2px}
.menu-items{margin-left:20px;display:grid;grid-template-columns:1fr 1fr;gap:4px 36px}
@media(max-width:640px){.menu-items{grid-template-columns:1fr}}
.mi{display:flex;align-items:center;gap:14px;padding:12px 8px;border-radius:12px;transition:background .2s}
.mi:hover{background:var(--putih-2)}
.mi .thumb{width:52px;height:52px;border-radius:50%;flex:none;object-fit:cover}
.mi .thumb-x{
  width:52px;height:52px;border-radius:50%;flex:none;background:var(--emas);
  display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:900;color:var(--ink);
}
.mi .t{flex:1;min-width:0}
.mi .t b{display:block;font-size:.98rem}
.mi .t small{color:var(--ink-soft);font-size:.8rem;display:block;margin-top:2px}
.mi .p{font-family:'Fraunces',serif;font-weight:900;font-size:1.05rem;color:var(--merah);white-space:nowrap;text-align:right}

.cta-bottom{
  margin:80px 0 40px;text-align:center;background:var(--merah);color:#fff;padding:50px 24px;border-radius:24px;
}
.cta-bottom h2{font-size:1.8rem;margin-bottom:10px}

footer{padding:40px 24px;text-align:center;color:var(--ink-soft);font-size:.85rem}

.rv{opacity:0;transform:translateY(30px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
.rv.in{opacity:1;transform:none}

    var byKat = {}, katOrder = [];
    items.forEach(function(m){
      if(!byKat[m.kat]){ byKat[m.kat] = []; katOrder.push(m.kat); }
      byKat[m.kat].push(m);
    });
    var singleSub = katOrder.length === 1 && katOrder[0] === top;

    katOrder.forEach(function(kat){
      if(!singleSub){
        var h3 = document.createElement('h3');
        h3.className = 'kat rv';
        h3.textContent = kat;
        wrap.appendChild(h3);
      }
      var grid = document.createElement('div');
      grid.className = 'menu-items';
      byKat[kat].forEach(function(m){
        var el = document.createElement('div');
        el.className = 'mi rv';
        var thumb = m.img
          ? '<img class="thumb" src="'+m.img+'" alt="'+m.nama+'" loading="lazy">'
          : '<div class="thumb-x">'+m.nama.charAt(0)+'</div>';
        var harga = (typeof m.harga === 'number') ? 'RM'+m.harga : m.harga;
        el.innerHTML = thumb +
          '<div class="t"><b>'+m.nama+'</b>'+(m.desc?'<small>'+m.desc+'</small>':'')+'</div>' +
          '<div class="p">'+harga+'</div>';
        grid.appendChild(el);
      });
      wrap.appendChild(grid);
    });
  });

  if(window.IntersectionObserver){
    var io = new IntersectionObserver(function(es){
      es.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} });
    },{threshold:.08});
    wrap.querySelectorAll('.rv').forEach(function(el){ io.observe(el); });
  } else {
    wrap.querySelectorAll('.rv').forEach(function(el){ el.classList.add('in'); });
  }
})();
</script>
</body>
</html>
