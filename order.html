<style>
:root{
  --merah:#C8102E; --merah-dk:#9E0C24; --emas:#C99A2E; --emas-hi:#E3B84F;
  --ink:#2B1A14; --ink-soft:#6E5A50; --putih:#FFFCF7; --putih-2:#FBF4E8;
  --ease:cubic-bezier(.22,1,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Karla',sans-serif;background:var(--putih-2);color:var(--ink);-webkit-font-smoothing:antialiased;padding-bottom:110px}
h1,h2,h3{font-family:'Fraunces',serif;font-weight:900}
.top{
  background:linear-gradient(160deg,var(--merah),var(--merah-dk));color:#fff;
  padding:22px 20px 26px;text-align:center;position:sticky;top:0;z-index:20;
  box-shadow:0 6px 20px rgba(0,0,0,.15);
}
.top .meja{font-size:.78rem;letter-spacing:.24em;text-transform:uppercase;color:var(--emas-hi);font-weight:800}
.top h1{font-size:1.5rem;margin-top:4px}
.wrap{max-width:640px;margin:0 auto;padding:22px 16px}
.top-title{
  font-size:1.7rem;margin:38px 0 4px;color:var(--merah);
  display:flex;align-items:center;gap:12px;
}
.top-title:first-of-type{margin-top:6px}
.top-title::before{content:"";width:26px;height:4px;background:var(--emas);border-radius:4px;flex:none}
.kat-title{
  font-size:1.05rem;margin:22px 0 10px 16px;display:flex;align-items:center;gap:12px;color:var(--ink-soft);
}
.kat-title::after{content:"";flex:1;height:1px;background:rgba(43,26,20,.1);border-radius:2px}
.item{margin-left:16px}
.item{
  background:#fff;border-radius:16px;padding:16px;display:flex;gap:14px;align-items:center;
  margin-bottom:10px;box-shadow:0 2px 10px rgba(43,26,20,.05);
}
.item .thumb{width:60px;height:60px;border-radius:50%;object-fit:cover;flex:none}
.item .thumb-x{
  width:60px;height:60px;border-radius:50%;background:var(--emas);flex:none;
  display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:900;font-size:1.3rem;color:var(--ink);
}
.item .t{flex:1;min-width:0}
.item .t b{display:block;font-size:1rem}
.item .t small{color:var(--ink-soft);font-size:.82rem}
.item .harga{font-family:'Fraunces',serif;font-weight:900;color:var(--merah);font-size:1.05rem;margin-top:2px;display:block}
.qty{display:flex;align-items:center;gap:10px;flex:none}
.qty button{
  width:32px;height:32px;border-radius:50%;border:2px solid var(--merah);background:#fff;color:var(--merah);
  font-size:1.1rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .15s;
}
.qty button:active{transform:scale(.9)}
.qty span{min-width:20px;text-align:center;font-weight:800}

.cart-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  background:linear-gradient(160deg,var(--merah),var(--merah-dk));color:#fff;
  padding:16px 20px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 -6px 26px rgba(0,0,0,.2);
  transform:translateY(120%);transition:transform .4s var(--ease);
}
.cart-bar.show{transform:translateY(0)}
.cart-bar .info{font-size:.9rem}
.cart-bar .info b{font-family:'Fraunces',serif;font-size:1.25rem;display:block}
.cart-bar button{
  background:#fff;color:var(--merah);border:none;padding:14px 28px;border-radius:999px;
  font-weight:800;font-size:.95rem;cursor:pointer;
}

.modal-bg{
  position:fixed;inset:0;background:rgba(43,26,20,.6);z-index:50;display:none;
  align-items:flex-end;justify-content:center;
}
.modal-bg.show{display:flex}
.modal{
  background:#fff;border-radius:22px 22px 0 0;padding:28px 22px 30px;width:100%;max-width:640px;
  max-height:80vh;overflow-y:auto;
}
.modal h2{font-size:1.4rem;margin-bottom:16px}
.modal .row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px dashed rgba(43,26,20,.14);font-size:.95rem}
.modal .total{display:flex;justify-content:space-between;padding:16px 0 0;font-family:'Fraunces',serif;font-weight:900;font-size:1.3rem;color:var(--merah)}
.modal .btn-hantar{
  width:100%;margin-top:20px;background:var(--merah);color:#fff;border:none;padding:16px;border-radius:999px;
  font-weight:800;font-size:1rem;cursor:pointer;
}
.modal .btn-batal{
  width:100%;margin-top:10px;background:none;border:none;color:var(--ink-soft);padding:10px;font-size:.9rem;cursor:pointer;
}

.ok-screen{
  position:fixed;inset:0;background:var(--putih);z-index:60;display:none;
  flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;
}
.ok-screen.show{display:flex}
.ok-screen .tick{
  width:84px;height:84px;border-radius:50%;background:var(--merah);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:2.4rem;margin-bottom:22px;
}
.ok-screen h2{font-size:1.7rem;margin-bottom:10px}
.ok-screen p{color:var(--ink-soft);max-width:340px}
.ok-screen .no{font-family:'Fraunces',serif;font-weight:900;font-size:2.2rem;color:var(--merah);margin-top:18px}
</style>
</head>

function renderMenu(){
  const wrap = document.getElementById('menuWrap');

  const topOrder = [], byTop = {};
  MENU_DATA.forEach(m => {
    if(!byTop[m.top]){ byTop[m.top] = []; topOrder.push(m.top); }
    byTop[m.top].push(m);
  });

  topOrder.forEach(top => {
    const items = byTop[top];
    const h2 = document.createElement('div');
    h2.className = 'top-title';
    h2.textContent = top;
    wrap.appendChild(h2);

    const byKat = {}, katOrder = [];
    items.forEach(m => {
      if(!byKat[m.kat]){ byKat[m.kat] = []; katOrder.push(m.kat); }
      byKat[m.kat].push(m);
    });
    const singleSub = katOrder.length === 1 && katOrder[0] === top;

    katOrder.forEach(kat => {
      if(!singleSub){
        const h3 = document.createElement('div');
        h3.className = 'kat-title'; h3.textContent = kat;
        wrap.appendChild(h3);
      }
      byKat[kat].forEach(m => {
        const row = document.createElement('div');
        row.className = 'item';
        const thumb = m.img
          ? `<img class="thumb" src="${m.img}" alt="${m.nama}">`
          : `<div class="thumb-x">${m.nama.charAt(0)}</div>`;
        const isNum = typeof m.harga === 'number';
        const hargaTxt = isNum ? (m.harga > 0 ? `RM${m.harga.toFixed(2).replace('.00','')}` : 'Tanya harga') : m.harga;
        const canOrder = isNum && m.harga > 0;
        row.innerHTML = `
          ${thumb}
          <div class="t"><b>${m.nama}</b>${m.desc ? `<small>${m.desc}</small>` : ''}<span class="harga">${hargaTxt}</span></div>
          ${canOrder ? `
          <div class="qty">
            <button data-a="minus" data-n="${m.nama}">–</button>
            <span id="q_${cssSafe(m.nama)}">0</span>
            <button data-a="plus" data-n="${m.nama}">+</button>
          </div>` : `<div class="qty" style="color:var(--ink-soft);font-size:.78rem;max-width:80px;text-align:right">Tanya staff</div>`}`;
        wrap.appendChild(row);
      });
    });
  });
}
function cssSafe(s){ return s.replace(/[^a-z0-9]/gi,'_'); }

function updateQty(nama, delta){
  const m = MENU_DATA.find(x => x.nama === nama);
  if(!cart[nama]) cart[nama] = {item:m, qty:0};
  cart[nama].qty = Math.max(0, cart[nama].qty + delta);
  document.getElementById('q_' + cssSafe(nama)).textContent = cart[nama].qty;
  renderCartBar();
}

function cartEntries(){ return Object.values(cart).filter(c => c.qty > 0); }

function renderCartBar(){
  const entries = cartEntries();
  const count = entries.reduce((s,c)=>s+c.qty,0);
  const total = entries.reduce((s,c)=>s+c.qty*c.item.harga,0);
  document.getElementById('cartCount').textContent = count;
  document.getElementById('cartTotal').textContent = 'RM' + total.toFixed(2);
  document.getElementById('cartBar').classList.toggle('show', count > 0);
}

document.getElementById('menuWrap').addEventListener('click', e => {
  const btn = e.target.closest('button[data-a]');
  if(!btn) return;
  updateQty(btn.dataset.n, btn.dataset.a === 'plus' ? 1 : -1);
});

document.getElementById('btnLihat').addEventListener('click', () => {
  const entries = cartEntries();
  const wrap = document.getElementById('modalItems');
  wrap.innerHTML = entries.map(c => `
    <div class="row"><span>${c.qty}× ${c.item.nama}</span><span>RM${(c.qty*c.item.harga).toFixed(2)}</span></div>
  `).join('');
  const total = entries.reduce((s,c)=>s+c.qty*c.item.harga,0);
  document.getElementById('modalTotal').textContent = 'RM' + total.toFixed(2);
  document.getElementById('modalBg').classList.add('show');
});
document.getElementById('btnBatal').addEventListener('click', () => {
  document.getElementById('modalBg').classList.remove('show');
});

document.getElementById('btnHantar').addEventListener('click', async () => {
  const entries = cartEntries();
  if(!entries.length) return;
  const total = entries.reduce((s,c)=>s+c.qty*c.item.harga,0);
  const itemsPayload = entries.map(c => ({nama:c.item.nama, qty:c.qty, harga:c.item.harga}));

  const btn = document.getElementById('btnHantar');
  btn.disabled = true; btn.textContent = 'Menghantar...';

  const { error } = await supa.from('orders').insert({
    meja: parseInt(meja) || 0,
    items: itemsPayload,
    jumlah: total,
    status: 'baru'
  });

  btn.disabled = false; btn.textContent = 'Hantar Order';

  if(error){
    alert('Maaf, ada masalah menghantar order. Cuba lagi atau panggil staff.');
    console.error(error);
    return;
  }

  document.getElementById('modalBg').classList.remove('show');
  document.getElementById('okScreen').classList.add('show');
  for(const k in cart) cart[k].qty = 0;
  document.querySelectorAll('[id^="q_"]').forEach(el => el.textContent = '0');
  renderCartBar();
  setTimeout(() => document.getElementById('okScreen').classList.remove('show'), 5000);
});

renderMenu();
</script>
</body>
</html>
