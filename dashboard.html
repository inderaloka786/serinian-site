<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Kaunter — Serinian</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Karla:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --merah:#C8102E; --merah-dk:#9E0C24; --emas:#C99A2E; --emas-hi:#E3B84F;
  --ink:#2B1A14; --ink-soft:#6E5A50; --bg:#F4EDE0; --hijau:#3F8A4C; --biru:#3568C4;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Karla',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
h1{font-family:'Fraunces',serif;font-weight:900}
header{
  background:linear-gradient(160deg,var(--merah),var(--merah-dk));color:#fff;
  padding:20px 28px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:10;box-shadow:0 6px 20px rgba(0,0,0,.15);
}
header h1{font-size:1.5rem}
.status-dot{width:10px;height:10px;border-radius:50%;background:#4ADE80;display:inline-block;margin-right:8px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.tabs{display:flex;gap:10px;padding:18px 28px 0}
.tab{
  padding:10px 22px;border-radius:999px;background:#fff;color:var(--ink-soft);font-weight:800;font-size:.9rem;
  cursor:pointer;border:2px solid transparent;
}
.tab.active{border-color:var(--merah);color:var(--merah)}
.count-badge{background:var(--merah);color:#fff;border-radius:999px;padding:1px 8px;font-size:.75rem;margin-left:6px}

.board{
  padding:24px 28px 60px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;
}
.card{
  background:#fff;border-radius:18px;padding:20px;box-shadow:0 4px 18px rgba(43,26,20,.08);
  border-left:6px solid var(--merah);
}
.card.disiapkan{border-left-color:#E0A32A}
.card.selesai{border-left-color:var(--hijau);opacity:.6}
.card.selesai.resit{border-left-color:var(--emas);opacity:1}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.card-top .meja{font-family:'Fraunces',serif;font-weight:900;font-size:1.5rem}
.card-top .masa{font-size:.78rem;color:var(--ink-soft);text-align:right}
.resit-vendor{margin:14px 0;padding-bottom:10px;border-bottom:1px solid rgba(43,26,20,.1)}
.resit-vendor:last-of-type{border-bottom:none}
.resit-vendor-name{
  font-weight:800;font-size:.82rem;color:var(--merah);text-transform:uppercase;
  letter-spacing:.04em;margin-bottom:4px;
}
.resit-subtotal{
  display:flex;justify-content:space-between;font-size:.85rem;font-weight:700;
  color:var(--ink-soft);margin-top:4px;
}
.jumlah.grand{
  font-size:1.3rem;border-top:2px dashed rgba(43,26,20,.2);padding-top:12px;margin-top:14px;
}
.vendor-badge{
  display:inline-block;margin-top:4px;padding:2px 10px;border-radius:999px;
  font-size:.7rem;font-weight:800;letter-spacing:.02em;
  background:var(--bg);color:var(--ink-soft);border:1px solid rgba(43,26,20,.15);
}
.card ul{list-style:none;margin:12px 0}
.card li{display:flex;justify-content:space-between;padding:6px 0;font-size:.92rem;border-bottom:1px dashed rgba(43,26,20,.1)}
.card .jumlah{
  display:flex;justify-content:space-between;font-family:'Fraunces',serif;font-weight:900;color:var(--merah);
  font-size:1.15rem;margin-top:10px;
}
.card .actions{display:flex;gap:8px;margin-top:16px}
.card .actions button{
  flex:1;padding:11px;border-radius:10px;border:none;font-weight:800;font-size:.85rem;cursor:pointer;
  transition:opacity .2s;
}
.card .actions button:hover{opacity:.85}
.btn-baru{background:var(--merah);color:#fff}
.btn-disiap{background:#E0A32A;color:#fff}
.btn-selesai{background:var(--hijau);color:#fff}
.empty{padding:60px 28px;text-align:center;color:var(--ink-soft)}
.empty b{display:block;font-family:'Fraunces',serif;font-size:1.4rem;color:var(--ink);margin-bottom:8px}
.btn-logout{background:none;border:none;color:#fff;opacity:.8;font-size:.78rem;font-weight:700;padding:6px;margin-right:14px;cursor:pointer}

.login-gate{
  position:fixed;inset:0;background:var(--merah-dk);z-index:999;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.login-box{
  background:#fff;border-radius:18px;padding:32px 26px;width:100%;max-width:340px;
  box-shadow:0 20px 50px rgba(0,0,0,.25);
}
.login-box h2{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:900;color:var(--merah);margin-bottom:4px}
.login-box .sub{font-size:.78rem;color:var(--ink-soft);margin-bottom:20px}
.login-box input{
  width:100%;padding:12px 14px;font-size:15px;margin-bottom:10px;
  border:2px solid rgba(43,26,20,.15);border-radius:10px;outline:none;font-family:'Karla',sans-serif;
}
.login-box input:focus{border-color:var(--merah)}
.login-box button{
  width:100%;min-height:48px;border:none;border-radius:999px;
  background:var(--merah);color:#fff;font-size:15px;font-weight:800;
  font-family:inherit;margin-top:6px;cursor:pointer;
}
.login-box button:active{background:var(--merah-dk)}
.login-err{color:var(--merah);font-size:.82rem;font-weight:700;margin-top:8px;display:none}
.login-err.show{display:block}
</style>
</head>
<body>

<div class="login-gate" id="loginGate">
  <div class="login-box">
    <h2>Log Masuk Dashboard</h2>
    <div class="sub">Restoran Seri Nian</div>
    <form id="loginForm">
      <input type="text" id="loginUser" placeholder="Username" autocomplete="username" required>
      <input type="password" id="loginPass" placeholder="Kata Laluan" autocomplete="current-password" required>
      <button type="submit">MASUK</button>
      <div class="login-err" id="loginErr">Username / kata laluan salah.</div>
    </form>
  </div>
</div>

<header>
  <h1><span class="status-dot"></span><span id="dashTitle">Dashboard Kaunter — Serinian</span></h1>
  <div style="display:flex;align-items:center">
    <button class="btn-logout" id="btnLogout" onclick="logout()">Log Keluar</button>
    <div style="font-size:.85rem;opacity:.85" id="jamNow"></div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-f="baru">Baru <span class="count-badge" id="cBaru">0</span></div>
  <div class="tab" data-f="disiapkan">Disiapkan <span class="count-badge" id="cDisiap">0</span></div>
  <div class="tab" data-f="selesai">Selesai <span class="count-badge" id="cSelesai">0</span></div>
  <div class="tab" data-f="semua">Semua</div>
</div>

<div class="board" id="board"></div>

<script>
/* ============ KONFIG SUPABASE — GANTI DUA NILAI NI (sama macam order.html) ============ */
const SUPABASE_URL = "https://afndxjdgxwhgcczuoeah.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmbmR4amRneHdoZ2NjenVvZWFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzMDIxOTQsImV4cCI6MjA5OTg3ODE5NH0.zWj_4z4kDNvR0NnmP-RDGDIseynFEr_QBgBRT0JWWOE";
/* ======================================================================================= */

const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ============ LOGIN — sama akaun/kata laluan macam pos.html ============
   Akaun vendor (lamanroti/neans) dikunci terus pada dashboard vendor dia
   (session menang atas ?vendor= URL). Akaun master (serian) dapat skrin
   cashier penuh secara default, tapi boleh guna ?vendor= untuk intip
   dashboard vendor tertentu kalau perlu. */
const LOGIN_ACCOUNTS = {
  serian:    { password: "9999", vendor: null },
  lamanroti: { password: "9999", vendor: "Laman Roti" },
  neans:     { password: "9999", vendor: "Neans" }
};
const SESSION_KEY = "sn_pos_session"; // sama key dgn pos.html, satu login untuk dua-dua

function getSession(){
  try{ return JSON.parse(localStorage.getItem(SESSION_KEY)); }
  catch(e){ return null; }
}
function logout(){
  localStorage.removeItem(SESSION_KEY);
  location.reload();
}
function showLoginGate(){ document.getElementById("loginGate").style.display = "flex"; }
function hideLoginGate(){ document.getElementById("loginGate").style.display = "none"; }

document.getElementById("loginForm").addEventListener("submit", e => {
  e.preventDefault();
  const u = document.getElementById("loginUser").value.trim().toLowerCase();
  const p = document.getElementById("loginPass").value;
  const acc = LOGIN_ACCOUNTS[u];
  if(!acc || acc.password !== p){
    document.getElementById("loginErr").classList.add("show");
    return;
  }
  localStorage.setItem(SESSION_KEY, JSON.stringify({ user: u, vendor: acc.vendor }));
  hideLoginGate();
  startApp();
});

/* ============ MOD VENDOR — ?vendor=Neans / ?vendor=Laman%20Roti ============
   Bila URL ada ?vendor=..., page ni jadi skrin vendor tu sahaja: papar order
   dia je, dan dia yang tekan Mula Siapkan / Selesai (sebab vendor sendiri
   yang masak/siapkan makanan dia).
   Tanpa ?vendor=, ini skrin cashier Restoran Seri Nian — papar SEMUA order
   dari semua vendor (rujuk no meja untuk kutip bayaran), tapi TAKDE butang
   ubah status — itu tanggungjawab vendor masing-masing, cashier baca sahaja. */
const params = new URLSearchParams(location.search);
let vendorView = params.get('vendor'); // null = cashier view (semua vendor)

let orders = [];
let filter = 'baru';

function fmtMasa(ts){
  const d = new Date(ts);
  return d.toLocaleTimeString('ms-MY', {hour:'2-digit', minute:'2-digit'});
}

/* Cashier view (takde ?vendor=) + tab "Selesai": gabung semua order selesai
   ikut no meja jadi SATU resit (pecah ikut vendor dalam resit tu), sebab
   itu bentuk cashier nak kutip bayaran — bukan senarai order berasingan. */
function renderResit(list){
  const board = document.getElementById('board');
  const byMeja = {};
  list.forEach(o => {
    if(!byMeja[o.meja]) byMeja[o.meja] = [];
    byMeja[o.meja].push(o);
  });
  const mejaKeys = Object.keys(byMeja);
  if(!mejaKeys.length){
    board.innerHTML = `<div class="empty" style="grid-column:1/-1"><b>Takde resit</b>Order yang selesai akan muncul di sini sebagai resit.</div>`;
    return;
  }
  board.innerHTML = mejaKeys.map(meja => {
    const group = byMeja[meja];
    const grandTotal = group.reduce((s,o)=>s+o.jumlah,0);
    const vendorSections = group.map(o => {
      const itemsHtml = o.items.map(it => `<li><span>${it.qty}× ${it.nama}</span><span>RM${(it.qty*it.harga).toFixed(2)}</span></li>`).join('');
      return `
        <div class="resit-vendor">
          <div class="resit-vendor-name">${o.vendor || 'Restoran Seri Nian'}</div>
          <ul>${itemsHtml}</ul>
          <div class="resit-subtotal"><span>Subjumlah</span><span>RM${o.jumlah.toFixed(2)}</span></div>
        </div>`;
    }).join('');
    return `
      <div class="card selesai resit">
        <div class="card-top">
          <div class="meja">Meja ${meja}</div>
          <div class="masa">RESIT</div>
        </div>
        ${vendorSections}
        <div class="jumlah grand"><span>Jumlah Keseluruhan</span><span>RM${grandTotal.toFixed(2)}</span></div>
      </div>`;
  }).join('');
}

function render(){
  const board = document.getElementById('board');
  const scoped = vendorView
    ? orders.filter(o => (o.vendor || 'Restoran Seri Nian') === vendorView)
    : orders;
  const list = filter === 'semua' ? scoped : scoped.filter(o => o.status === filter);

  document.getElementById('cBaru').textContent = scoped.filter(o=>o.status==='baru').length;
  document.getElementById('cDisiap').textContent = scoped.filter(o=>o.status==='disiapkan').length;
  document.getElementById('cSelesai').textContent = scoped.filter(o=>o.status==='selesai').length;

  if(!vendorView && filter === 'selesai'){
    renderResit(list);
    return;
  }

  if(!list.length){
    board.innerHTML = `<div class="empty" style="grid-column:1/-1"><b>Takde order</b>Order baru akan muncul kat sini secara live.</div>`;
    return;
  }

  board.innerHTML = list.map(o => {
    const itemsHtml = o.items.map(it => `<li><span>${it.qty}× ${it.nama}</span><span>RM${(it.qty*it.harga).toFixed(2)}</span></li>`).join('');
    let actions = '';
    if(vendorView){
      if(o.status === 'baru'){
        actions = `<button class="btn-disiap" data-id="${o.id}" data-s="disiapkan">Mula Siapkan</button>`;
      } else if(o.status === 'disiapkan'){
        actions = `<button class="btn-selesai" data-id="${o.id}" data-s="selesai">Tandakan Selesai</button>`;
      } else {
        actions = `<button class="btn-baru" data-id="${o.id}" data-s="baru">Buka Semula</button>`;
      }
    }
    return `
      <div class="card ${o.status}">
        <div class="card-top">
          <div class="meja">Meja ${o.meja}</div>
          <div class="masa">
            ${fmtMasa(o.created_at)}<br>
            <span class="vendor-badge">${o.vendor || 'Restoran Seri Nian'}</span>
          </div>
        </div>
        <ul>${itemsHtml}</ul>
        <div class="jumlah"><span>Jumlah</span><span>RM${o.jumlah.toFixed(2)}</span></div>
        ${actions ? `<div class="actions">${actions}</div>` : ''}
      </div>`;
  }).join('');
}

document.getElementById('board').addEventListener('click', async e => {
  const btn = e.target.closest('button[data-id]');
  if(!btn) return;
  const { id, s } = btn.dataset;
  btn.disabled = true;
  const { error } = await supa.from('orders').update({status: s}).eq('id', id);
  if(error){ console.error(error); btn.disabled = false; return; }
  const o = orders.find(x => x.id === id);
  if(o) o.status = s;
  render();
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    filter = tab.dataset.f;
    render();
  });
});

async function loadInitial(){
  const { data, error } = await supa.from('orders')
    .select('*')
    .gte('created_at', new Date(Date.now() - 24*60*60*1000).toISOString())
    .order('created_at', {ascending:false});
  if(error){ console.error(error); return; }
  orders = data;
  render();
}

function tickJam(){
  document.getElementById('jamNow').textContent = new Date().toLocaleTimeString('ms-MY');
}

/* ---------- INIT (lepas login sahaja) ---------- */
let appStarted = false;
function startApp(){
  if(appStarted) return; // elak subscribe/loadInitial dua kali
  appStarted = true;

  const session = getSession();
  if(session && session.vendor) vendorView = session.vendor; // akaun vendor terkunci, menang atas ?vendor=
  if(vendorView) document.getElementById('dashTitle').textContent = `Dashboard ${vendorView}`;

  supa.channel('orders-live')
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'orders'}, payload => {
      orders.unshift(payload.new);
      render();
      // bunyi notifikasi ringkas
      try{
        const ctx = new (window.AudioContext||window.webkitAudioContext)();
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = 880; g.gain.value = 0.15;
        o.start(); o.stop(ctx.currentTime + 0.25);
      }catch(e){}
    })
    .on('postgres_changes', {event:'UPDATE', schema:'public', table:'orders'}, payload => {
      const idx = orders.findIndex(o => o.id === payload.new.id);
      if(idx > -1) orders[idx] = payload.new;
      render();
    })
    .subscribe();

  setInterval(tickJam, 1000); tickJam();
  loadInitial();
}

const existingSession = getSession();
if(existingSession){
  hideLoginGate();
  startApp();
} else {
  showLoginGate();
}
</script>
</body>
</html>
