<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Urus Menu · Seri Nian</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --hijau:#4a8c4a; --hijau-tua:#356835; --hijau-muda:#e8f2e8;
    --merah:#c0392b; --kertas:#fafaf7; --ink:#22301f; --garis:#d8e2d4;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;background:var(--kertas);color:var(--ink)}
  header{
    background:var(--hijau);color:#fff;padding:14px 18px;
    display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:5;
  }
  header h1{font-size:17px;font-weight:800}
  header .sub{font-size:11px;opacity:.85}
  .btn-logout{margin-left:auto;background:none;border:none;color:#fff;opacity:.85;font-size:12px;font-weight:700;padding:6px;cursor:pointer}

  .wrap{max-width:960px;margin:0 auto;padding:16px}

  .add-box{
    background:#fff;border:1.5px solid var(--garis);border-radius:14px;
    padding:16px;margin-bottom:20px;
  }
  .add-box h2{font-size:15px;font-weight:800;color:var(--hijau-tua);margin-bottom:12px}
  .add-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:8px}
  .add-grid input, .add-grid select{
    padding:10px;font-size:14px;border:2px solid var(--garis);border-radius:8px;outline:none;font-family:inherit;
  }
  .add-grid input:focus, .add-grid select:focus{border-color:var(--hijau)}
  .btn-add{background:var(--hijau);color:#fff;border:none;border-radius:8px;font-weight:800;font-size:14px;cursor:pointer;padding:10px 16px}
  .btn-add:active{background:var(--hijau-tua)}
  @media (max-width:720px){ .add-grid{grid-template-columns:1fr 1fr} }

  .filter-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px}
  .filter-tab{
    padding:8px 16px;border-radius:999px;font-size:13px;font-weight:700;
    background:var(--hijau-muda);color:var(--hijau-tua);border:none;white-space:nowrap;cursor:pointer;
  }
  .filter-tab.active{background:var(--hijau);color:#fff}

  table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
  th, td{padding:10px 12px;text-align:left;font-size:13px;border-bottom:1px solid var(--garis)}
  th{background:var(--hijau-muda);color:var(--hijau-tua);font-weight:800;font-size:12px;text-transform:uppercase}
  tr.inactive td{opacity:.45}
  td.num{text-align:right;font-weight:700}
  input.edit-field{
    width:100%;padding:6px 8px;font-size:13px;border:1.5px solid var(--garis);border-radius:6px;font-family:inherit;
  }
  .row-actions{display:flex;gap:6px;white-space:nowrap}
  .row-actions button{
    padding:6px 10px;font-size:12px;font-weight:700;border:none;border-radius:6px;cursor:pointer;
  }
  .btn-save{background:var(--hijau);color:#fff}
  .btn-toggle{background:#f0e4d0;color:#8a6d3b}
  .btn-toggle.reactivate{background:var(--hijau-muda);color:var(--hijau-tua)}

  .login-gate{
    position:fixed;inset:0;background:var(--hijau-tua);z-index:999;
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .login-box{background:#fff;border-radius:18px;padding:32px 26px;width:100%;max-width:340px;box-shadow:0 20px 50px rgba(0,0,0,.25)}
  .login-box h2{font-size:18px;font-weight:800;color:var(--hijau-tua);margin-bottom:4px}
  .login-box .sub{font-size:12px;color:#6d7d68;margin-bottom:20px}
  .login-box input{width:100%;padding:12px 14px;font-size:15px;margin-bottom:10px;border:2px solid var(--garis);border-radius:10px;outline:none}
  .login-box input:focus{border-color:var(--hijau)}
  .login-box button{width:100%;min-height:48px;border:none;border-radius:10px;background:var(--hijau);color:#fff;font-size:15px;font-weight:800;font-family:inherit;margin-top:6px;cursor:pointer}
  .login-err{color:var(--merah);font-size:13px;font-weight:700;margin-top:8px;display:none}
  .login-err.show{display:block}
</style>
</head>
<body>

<div class="login-gate" id="loginGate">
  <div class="login-box">
    <h2>Log Masuk Urus Menu</h2>
    <div class="sub">Restoran Seri Nian, Laman Roti &amp; Neans</div>
    <form id="loginForm">
      <input type="text" id="loginUser" placeholder="Username" autocomplete="username" required>
      <input type="password" id="loginPass" placeholder="Kata Laluan" autocomplete="current-password" required>
      <button type="submit">MASUK</button>
      <div class="login-err" id="loginErr">Username / kata laluan salah.</div>
    </form>
  </div>
</div>

<header>
  <div>
    <h1>Urus Menu</h1>
    <div class="sub" id="headerSub">Restoran Seri Nian</div>
  </div>
  <button class="btn-logout" onclick="logout()">Log Keluar</button>
</header>

<div class="wrap">

  <div class="add-box">
    <h2>+ Tambah Item Baru <span id="addBoxVendorLabel" style="font-weight:700;color:#6d7d68"></span></h2>
    <div class="add-grid">
      <input type="text" id="newName" placeholder="Nama item">
      <input type="number" id="newPrice" placeholder="Harga" step="0.5" min="0">
      <input type="text" id="newCategory" placeholder="Kategori">
      <select id="newVendor">
        <option>Restoran Seri Nian</option>
        <option>Laman Roti</option>
        <option>Neans</option>
      </select>
      <button class="btn-add" onclick="addItem()">Tambah</button>
    </div>
  </div>

  <div class="filter-tabs" id="filterTabs"></div>

  <table>
    <thead>
      <tr><th>Nama</th><th>Kategori</th><th>Vendor</th><th style="text-align:right">Harga</th><th>Status</th><th></th></tr>
    </thead>
    <tbody id="itemsBody"></tbody>
  </table>

</div>

<script>
/* ============ CONFIG (sama macam pos.html) ============ */
const SUPABASE_URL      = "https://afndxjdgxwhgcczuoeah.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmbmR4amRneHdoZ2NjenVvZWFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzMDIxOTQsImV4cCI6MjA5OTg3ODE5NH0.zWj_4z4kDNvR0NnmP-RDGDIseynFEr_QBgBRT0JWWOE";
const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ============ LOGIN — sama akaun dgn pos.html/dashboard.html.
   Akaun vendor (lamanroti/neans) boleh urus menu jugak — tapi terkunci
   nampak & edit item vendor dia sendiri sahaja (dia yang paling tahu
   menu dia). Akaun master (serinian, vendor:null) nampak & urus semua
   vendor. */
const LOGIN_ACCOUNTS = {
  serinian:  { password: "9999", vendor: null },
  lamanroti: { password: "9999", vendor: "Laman Roti" },
  neans:     { password: "9999", vendor: "Neans" }
};
const SESSION_KEY = "sn_pos_session";
let lockedVendor = null; // null = master, boleh nampak semua vendor

function getSession(){
  try{ return JSON.parse(localStorage.getItem(SESSION_KEY)); }
  catch(e){ return null; }
}
function logout(){ localStorage.removeItem(SESSION_KEY); location.reload(); }
function showLoginGate(){ document.getElementById("loginGate").style.display = "flex"; }
function hideLoginGate(){ document.getElementById("loginGate").style.display = "none"; }

document.getElementById("loginForm").addEventListener("submit", e => {
  e.preventDefault();
  const u = document.getElementById("loginUser").value.trim().toLowerCase();
  const p = document.getElementById("loginPass").value;
  const acc = LOGIN_ACCOUNTS[u];
  if(!acc || acc.password !== p){
    document.getElementById("loginErr").classList.add("show");
    return;
  }
  document.getElementById("loginErr").classList.remove("show");
  localStorage.setItem(SESSION_KEY, JSON.stringify({ user: u, vendor: acc.vendor }));
  hideLoginGate();
  startApp();
});

/* ============ DATA ============ */
let items = [];
let filterVendor = "Semua";

async function loadItems(){
  let query = supa.from("menu_items").select("*").order("vendor").order("category").order("name");
  if(lockedVendor) query = query.eq("vendor", lockedVendor); // vendor: nampak menu dia sahaja
  const { data, error } = await query;
  if(error){ console.error(error); return; }
  items = data;
  render();
}

function getVendorTabs(){
  return ["Semua", ...new Set(items.map(i => i.vendor))];
}

function render(){
  const tabsEl = document.getElementById("filterTabs");
  if(lockedVendor){
    tabsEl.style.display = "none"; // vendor cuma ada satu vendor, tak perlu tab
  } else {
    tabsEl.style.display = "flex";
    tabsEl.innerHTML = getVendorTabs().map(v =>
      `<button class="filter-tab ${v===filterVendor?'active':''}" onclick="setFilter('${v.replace(/'/g,"\\'")}')">${v}</button>`
    ).join("");
  }

  const list = (lockedVendor || filterVendor === "Semua") ? items : items.filter(i => i.vendor === filterVendor);

  document.getElementById("itemsBody").innerHTML = list.map(i => `
    <tr class="${i.active ? '' : 'inactive'}" data-id="${i.id}">
      <td><input class="edit-field" data-field="name" value="${i.name.replace(/"/g,'&quot;')}"></td>
      <td><input class="edit-field" data-field="category" value="${i.category.replace(/"/g,'&quot;')}"></td>
      <td>${i.vendor}</td>
      <td class="num"><input class="edit-field" data-field="price" type="number" step="0.5" min="0" value="${i.price}" style="text-align:right"></td>
      <td>${i.active ? 'Aktif' : 'Nyahaktif'}</td>
      <td>
        <div class="row-actions">
          <button class="btn-save" onclick="saveItem(${i.id})">Simpan</button>
          <button class="btn-toggle ${i.active ? '' : 'reactivate'}" onclick="toggleActive(${i.id}, ${!i.active})">${i.active ? 'Nyahaktifkan' : 'Aktifkan'}</button>
        </div>
      </td>
    </tr>
  `).join("") || `<tr><td colspan="6" style="text-align:center;color:#9aa895;padding:24px">Takde item</td></tr>`;
}

function setFilter(v){ filterVendor = v; render(); }

async function addItem(){
  const name = document.getElementById("newName").value.trim();
  const price = parseFloat(document.getElementById("newPrice").value);
  const category = document.getElementById("newCategory").value.trim();
  const vendor = lockedVendor || document.getElementById("newVendor").value;
  if(!name || isNaN(price) || !category){
    alert("Isi semua medan: nama, harga, kategori.");
    return;
  }
  const { error } = await supa.from("menu_items").insert({ name, price, category, vendor, active: true });
  if(error){ console.error(error); alert("Gagal tambah item."); return; }
  document.getElementById("newName").value = "";
  document.getElementById("newPrice").value = "";
  document.getElementById("newCategory").value = "";
  await loadItems();
}

async function saveItem(id){
  const row = document.querySelector(`tr[data-id="${id}"]`);
  const name = row.querySelector('[data-field="name"]').value.trim();
  const category = row.querySelector('[data-field="category"]').value.trim();
  const price = parseFloat(row.querySelector('[data-field="price"]').value);
  if(!name || !category || isNaN(price)){
    alert("Medan tak lengkap.");
    return;
  }
  const { error } = await supa.from("menu_items").update({ name, category, price }).eq("id", id);
  if(error){ console.error(error); alert("Gagal simpan."); return; }
  await loadItems();
}

async function toggleActive(id, newVal){
  const { error } = await supa.from("menu_items").update({ active: newVal }).eq("id", id);
  if(error){ console.error(error); alert("Gagal ubah status."); return; }
  await loadItems();
}

/* ============ INIT ============ */
function startApp(){
  const session = getSession();
  lockedVendor = session.vendor || null;
  if(lockedVendor){
    document.getElementById("newVendor").style.display = "none";
    document.getElementById("addBoxVendorLabel").textContent = `(${lockedVendor})`;
    document.getElementById("headerSub").textContent = lockedVendor;
  }
  loadItems();
}

const existingSession = getSession();
if(existingSession && existingSession.user){
  hideLoginGate();
  startApp();
} else {
  showLoginGate();
}
</script>
</body>
</html>
