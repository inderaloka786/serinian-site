<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>POS Kaunter Seri Nian</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --hijau:#4a8c4a;
    --hijau-tua:#356835;
    --hijau-muda:#e8f2e8;
    --merah:#c0392b;
    --kertas:#fafaf7;
    --ink:#22301f;
    --garis:#d8e2d4;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;
    background:var(--kertas);color:var(--ink);
    display:flex;flex-direction:column;overflow:hidden;
  }

  /* ===== HEADER ===== */
  header{
    background:var(--hijau);color:#fff;
    padding:10px 14px;display:flex;align-items:center;gap:10px;
    flex-shrink:0;
  }
  header h1{font-size:16px;font-weight:800;letter-spacing:.3px}
  header .sub{font-size:11px;opacity:.85}
  .status-dot{width:10px;height:10px;border-radius:50%;background:#7CFC00;margin-left:auto;flex-shrink:0}
  .status-dot.offline{background:#ffb3a7}
  .btn-logout{background:none;border:none;color:#fff;opacity:.8;font-size:11px;font-weight:700;padding:6px;flex-shrink:0}

  /* ===== LOGIN GATE ===== */
  .login-gate{
    position:fixed;inset:0;background:var(--hijau-tua);z-index:999;
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .login-box{
    background:#fff;border-radius:18px;padding:32px 26px;width:100%;max-width:340px;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
  }
  .login-box h2{font-size:18px;font-weight:800;color:var(--hijau-tua);margin-bottom:4px}
  .login-box .sub{font-size:12px;color:#6d7d68;margin-bottom:20px}
  .login-box input{
    width:100%;padding:12px 14px;font-size:15px;margin-bottom:10px;
    border:2px solid var(--garis);border-radius:10px;outline:none;
  }
  .login-box input:focus{border-color:var(--hijau)}
  .login-box button{
    width:100%;min-height:48px;border:none;border-radius:10px;
    background:var(--hijau);color:#fff;font-size:15px;font-weight:800;
    font-family:inherit;margin-top:6px;
  }
  .login-box button:active{background:var(--hijau-tua)}
  .login-err{color:var(--merah);font-size:13px;font-weight:700;margin-top:8px;display:none}
  .login-err.show{display:block}

  /* ===== LAYOUT ===== */
  .layout{flex:1;display:flex;overflow:hidden}

  /* ===== MENU SIDE ===== */
  .menu-side{flex:1.4;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--garis)}
  .search-bar{padding:8px;background:#fff;border-bottom:1px solid var(--garis);flex-shrink:0}
  .search-bar input{
    width:100%;padding:12px 14px;font-size:15px;
    border:2px solid var(--garis);border-radius:10px;outline:none;
  }
  .search-bar input:focus{border-color:var(--hijau)}
  .custom-box{
    display:flex;gap:6px;padding:0 8px 8px;background:#fff;
    border-bottom:1px solid var(--garis);flex-shrink:0;
  }
  .custom-box input{
    padding:10px;font-size:13px;border:1.5px dashed var(--garis);border-radius:8px;outline:none;
  }
  .custom-box input:focus{border-color:var(--hijau);border-style:solid}
  .custom-box input#customName{flex:1.6;min-width:0}
  .custom-box input#customPrice{flex:1;min-width:0}
  .custom-box button{
    flex-shrink:0;padding:10px 14px;border:none;border-radius:8px;
    background:var(--hijau-muda);color:var(--hijau-tua);font-weight:800;font-size:13px;font-family:inherit;
  }
  .custom-box button:active{background:var(--hijau);color:#fff}
  .vendor-tabs{
    display:flex;gap:6px;overflow-x:auto;padding:8px 8px 0;background:var(--hijau-tua);
    flex-shrink:0;scrollbar-width:none;
  }
  .vendor-tabs::-webkit-scrollbar{display:none}
  .vendor-tab{
    padding:10px 18px;border-radius:10px 10px 0 0;font-size:13px;font-weight:800;
    background:rgba(255,255,255,.15);color:#e8f2e8;
    border:none;white-space:nowrap;flex-shrink:0;letter-spacing:.3px;
  }
  .vendor-tab.active{background:var(--kertas);color:var(--hijau-tua)}
  .cat-tabs{
    display:flex;gap:6px;overflow-x:auto;padding:8px;background:#fff;
    border-bottom:1px solid var(--garis);flex-shrink:0;
    scrollbar-width:none;
  }
  .cat-tabs::-webkit-scrollbar{display:none}
  .cat-tab{
    padding:10px 16px;border-radius:999px;font-size:13px;font-weight:700;
    background:var(--hijau-muda);color:var(--hijau-tua);
    border:none;white-space:nowrap;flex-shrink:0;
  }
  .cat-tab.active{background:var(--hijau);color:#fff}
  .menu-grid{
    flex:1;overflow-y:auto;padding:8px;
    display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:8px;align-content:start;
  }
  .item-btn{
    min-height:72px;padding:10px;border-radius:12px;
    background:#fff;border:1.5px solid var(--garis);
    display:flex;flex-direction:column;justify-content:space-between;gap:6px;
    text-align:left;font-family:inherit;
  }
  .item-btn:active{background:var(--hijau-muda);border-color:var(--hijau);transform:scale(.97)}
  .item-btn .nm{font-size:13px;font-weight:700;line-height:1.25}
  .item-btn .pr{font-size:13px;font-weight:800;color:var(--hijau-tua)}

  /* ===== CART SIDE ===== */
  .cart-side{
    flex:1;display:flex;flex-direction:column;overflow:hidden;
    background:#fff;min-width:290px;max-width:420px;
  }
  .cart-head{
    padding:10px 14px;background:var(--hijau-muda);
    font-size:13px;font-weight:800;color:var(--hijau-tua);
    display:flex;justify-content:space-between;align-items:center;flex-shrink:0;
  }
  .cart-head button{
    background:none;border:none;color:var(--merah);
    font-size:12px;font-weight:700;padding:6px;
  }
  .cart-list{flex:1;overflow-y:auto}
  .cart-empty{padding:40px 20px;text-align:center;color:#9aa895;font-size:14px}
  .cart-row{
    display:flex;align-items:center;gap:8px;
    padding:10px 12px;border-bottom:1px solid var(--garis);
  }
  .cart-row .info{flex:1;min-width:0}
  .cart-row .info .nm{font-size:13px;font-weight:700;line-height:1.2}
  .cart-row .info .pr{font-size:12px;color:#6d7d68}
  .qty-ctrl{display:flex;align-items:center;gap:2px;flex-shrink:0}
  .qty-ctrl button{
    width:40px;height:40px;border-radius:10px;border:none;
    font-size:20px;font-weight:800;
    background:var(--hijau-muda);color:var(--hijau-tua);
  }
  .qty-ctrl button:active{background:var(--hijau);color:#fff}
  .qty-ctrl .q{width:32px;text-align:center;font-size:15px;font-weight:800}
  .row-total{width:70px;text-align:right;font-size:13px;font-weight:800;flex-shrink:0}

  /* ===== FOOTER / SUBMIT ===== */
  .cart-foot{padding:10px 12px;border-top:2px solid var(--garis);flex-shrink:0;background:#fff}
  .meja-input{
    width:100%;padding:12px;font-size:14px;margin-bottom:8px;
    border:2px solid var(--garis);border-radius:10px;outline:none;
  }
  .meja-input:focus{border-color:var(--hijau)}
  .total-line{
    display:flex;justify-content:space-between;align-items:baseline;
    margin-bottom:8px;
  }
  .total-line .lbl{font-size:13px;font-weight:700;color:#6d7d68}
  .total-line .amt{font-size:26px;font-weight:800;color:var(--ink)}
  .btn-hantar{
    width:100%;min-height:60px;border:none;border-radius:14px;
    background:var(--hijau);color:#fff;
    font-size:18px;font-weight:800;letter-spacing:.5px;
    font-family:inherit;
  }
  .btn-hantar:active{background:var(--hijau-tua)}
  .btn-hantar:disabled{background:#c3d2be;color:#f2f6f0}

  /* ===== TOAST ===== */
  .toast{
    position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:14px 22px;border-radius:12px;
    font-size:14px;font-weight:700;opacity:0;pointer-events:none;
    transition:all .25s ease;z-index:99;max-width:90vw;text-align:center;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.err{background:var(--merah)}

  /* ===== RETRY BAR ===== */
  .retry-bar{
    display:none;padding:10px 12px;background:#fdecea;color:var(--merah);
    font-size:13px;font-weight:700;align-items:center;gap:10px;flex-shrink:0;
  }
  .retry-bar.show{display:flex}
  .retry-bar button{
    margin-left:auto;padding:10px 16px;border:none;border-radius:10px;
    background:var(--merah);color:#fff;font-weight:800;font-size:13px;
  }

  /* ===== MOBILE: stacked with cart drawer ===== */
  @media (max-width:720px){
    .layout{flex-direction:column}
    .menu-side{flex:1;border-right:none}
    .cart-side{
      position:fixed;left:0;right:0;bottom:0;top:auto;
      max-width:none;min-width:0;
      max-height:75vh;height:auto;
      border-radius:18px 18px 0 0;
      box-shadow:0 -8px 30px rgba(0,0,0,.18);
      transform:translateY(calc(100% - 64px));
      transition:transform .25s ease;
      z-index:50;
    }
    .cart-side.open{transform:translateY(0)}
    .cart-head{
      border-radius:18px 18px 0 0;padding:16px 14px;
      cursor:pointer;
    }
    .cart-list{max-height:35vh}
  }

  .badge-aktif{
    background:#fff;color:var(--hijau-tua);border-radius:999px;
    padding:1px 7px;font-size:10px;font-weight:800;margin-left:4px;
  }

  /* ===== DASHBOARD (dibenamkan terus dalam pos.html — satu fail, satu login,
     satu screen). Vendor/cashier tekan "Dashboard" kat header, terus toggle
     overlay ni, tak payah navigate ke fail lain. Style diasingkan dgn nama
     variable --d-* supaya tak clash dgn tema hijau POS. ===== */
  .dash-overlay{
    display:none;position:fixed;inset:0;z-index:300;overflow-y:auto;
    --d-merah:#C8102E; --d-merah-dk:#9E0C24; --d-emas:#C99A2E;
    --d-ink:#2B1A14; --d-ink-soft:#6E5A50; --d-bg:#F4EDE0; --d-hijau:#3F8A4C;
    background:var(--d-bg);font-family:'Plus Jakarta Sans',system-ui,sans-serif;
  }
  .dash-overlay.show{display:block}
  .dash-head{
    background:linear-gradient(160deg,var(--d-merah),var(--d-merah-dk));color:#fff;
    padding:16px 20px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:5;
  }
  .dash-head h2{font-size:17px;font-weight:800}
  .dash-head button{background:none;border:none;color:#fff;opacity:.85;font-size:12px;font-weight:700;padding:6px}
  .dash-tabs{display:flex;gap:8px;padding:14px 20px 0;flex-wrap:wrap}
  .dash-tab{
    padding:9px 18px;border-radius:999px;background:#fff;color:var(--d-ink-soft);
    font-weight:800;font-size:.82rem;border:2px solid transparent;cursor:pointer;
  }
  .dash-tab.active{border-color:var(--d-merah);color:var(--d-merah)}
  .dash-count{background:var(--d-merah);color:#fff;border-radius:999px;padding:1px 7px;font-size:.7rem;margin-left:5px}
  .dash-board{padding:18px 20px 50px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
  .dash-card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 4px 16px rgba(43,26,20,.08);border-left:5px solid var(--d-merah);color:var(--d-ink)}
  .dash-card.disiapkan{border-left-color:#E0A32A}
  .dash-card.selesai{border-left-color:var(--d-hijau);opacity:.65}
  .dash-card.selesai.resit{border-left-color:var(--d-emas);opacity:1}
  .dash-card.batal{border-left-color:var(--d-ink-soft);opacity:.55}
  .dash-card.batal .dash-jum{text-decoration:line-through}
  .dash-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
  .dash-card-top .meja{font-weight:900;font-size:1.2rem}
  .dash-card-top .masa{font-size:.72rem;color:var(--d-ink-soft);text-align:right}
  .dash-vbadge{display:inline-block;margin-top:3px;padding:2px 9px;border-radius:999px;font-size:.65rem;font-weight:800;background:var(--d-bg);color:var(--d-ink-soft);border:1px solid rgba(43,26,20,.15)}
  .dash-card ul{list-style:none;margin:8px 0}
  .dash-card li{display:flex;justify-content:space-between;padding:4px 0;font-size:.85rem;border-bottom:1px dashed rgba(43,26,20,.1)}
  .dash-jum{display:flex;justify-content:space-between;font-weight:900;color:var(--d-merah);font-size:1.05rem;margin-top:8px}
  .dash-actions{display:flex;gap:6px;margin-top:12px}
  .dash-actions button{flex:1;padding:10px;border-radius:9px;border:none;font-weight:800;font-size:.8rem;cursor:pointer}
  .dash-btn-baru{background:var(--d-merah);color:#fff}
  .dash-btn-disiap{background:#E0A32A;color:#fff}
  .dash-btn-selesai{background:var(--d-hijau);color:#fff}
  .dash-btn-batal{background:none;color:var(--d-ink-soft);border:2px solid rgba(43,26,20,.15) !important;flex:none !important;width:auto;padding:10px 12px !important}
  .dash-btn-cetak{width:100%;min-height:40px;border:none;border-radius:9px;background:var(--d-emas);color:#fff;font-weight:800;font-size:.82rem;cursor:pointer}
  .dash-resit-vendor{margin:12px 0;padding-bottom:8px;border-bottom:1px solid rgba(43,26,20,.1)}
  .dash-resit-vendor:last-of-type{border-bottom:none}
  .dash-resit-vendor-name{font-weight:800;font-size:.78rem;color:var(--d-merah);text-transform:uppercase;letter-spacing:.03em;margin-bottom:3px}
  .dash-resit-subtotal{display:flex;justify-content:space-between;font-size:.82rem;font-weight:700;color:var(--d-ink-soft);margin-top:3px}
  .dash-jum.grand{font-size:1.15rem;border-top:2px dashed rgba(43,26,20,.2);padding-top:10px;margin-top:12px}
  .dash-empty{padding:50px 20px;text-align:center;color:var(--d-ink-soft);grid-column:1/-1}
  .dash-empty b{display:block;font-size:1.2rem;color:var(--d-ink);margin-bottom:6px}

  /* ===== RESIT (print) ===== */
  .receipt-print{display:none}
  #btnCetakResit{
    width:100%;min-height:44px;border:none;border-radius:10px;margin-top:8px;
    background:none;border:2px solid var(--hijau);color:var(--hijau-tua);
    font-size:14px;font-weight:800;font-family:inherit;display:none;
  }
  #btnCetakResit.show{display:block}
  @media print{
    body *{visibility:hidden}
    .receipt-print, .receipt-print *{visibility:visible}
    @page{size:58mm auto;margin:0}
    .receipt-print{
      display:block;position:absolute;top:0;left:0;width:58mm;
      padding:2mm;font-family:'Courier New',monospace;color:#000;
    }
    .receipt-print h2{font-size:12px;text-align:center;margin-bottom:2px}
    .receipt-print .sub{font-size:9px;text-align:center;margin-bottom:5px}
    .receipt-print .line{border-top:1px dashed #000;margin:4px 0}
    .receipt-print table{width:100%;border-collapse:collapse;font-size:10px}
    .receipt-print td{padding:1px 0}
    .receipt-print .r{text-align:right}
    .receipt-print .total{font-size:11px;font-weight:800}
    .receipt-print .foot{text-align:center;font-size:9px;margin-top:6px}
  }
</style>
</head>
<body>

<div class="login-gate" id="loginGate">
  <div class="login-box">
    <h2>Log Masuk POS</h2>
    <div class="sub">Restoran Seri Nian</div>
    <form id="loginForm">
      <input type="text" id="loginUser" placeholder="Username" autocomplete="username" required>
      <input type="password" id="loginPass" placeholder="Kata Laluan" autocomplete="current-password" required>
      <button type="submit">MASUK</button>
      <div class="login-err" id="loginErr">Username / kata laluan salah.</div>
    </form>
  </div>
</div>

<header>
  <div>
    <h1>POS Kaunter</h1>
    <div class="sub">Restoran Seri Nian</div>
  </div>
  <button class="btn-logout" onclick="toggleDashboard(true)">Dashboard<span class="badge-aktif" id="badgeAktif">0</span></button>
  <a href="menu-admin.html" class="btn-logout" id="linkUrusMenu" style="display:none;text-decoration:none">Urus Menu</a>
  <button class="btn-logout" id="btnLogout" onclick="logout()">Log Keluar</button>
  <div class="status-dot" id="netDot" title="Sambungan"></div>
</header>

<div class="dash-overlay" id="dashboardScreen">
  <div class="dash-head">
    <h2 id="dashTitle">Dashboard</h2>
    <button onclick="toggleDashboard(false)">&times; Tutup</button>
  </div>
  <div class="dash-tabs" id="dashTabs">
    <div class="dash-tab active" data-f="baru" id="dashTabBaru">Baru <span class="dash-count" id="dcBaru">0</span></div>
    <div class="dash-tab" data-f="disiapkan" id="dashTabDisiap">Disiapkan <span class="dash-count" id="dcDisiap">0</span></div>
    <div class="dash-tab" data-f="selesai">Selesai <span class="dash-count" id="dcSelesai">0</span></div>
    <div class="dash-tab" data-f="batal">Batal <span class="dash-count" id="dcBatal">0</span></div>
    <div class="dash-tab" data-f="semua">Semua</div>
  </div>
  <div class="dash-board" id="dashBoard"></div>
</div>

<div class="retry-bar" id="retryBar">
  <span>Order tak masuk. Internet putus?</span>
  <button onclick="hantarOrder()">CUBA LAGI</button>
</div>

<div class="layout">

  <!-- MENU -->
  <div class="menu-side">
    <div class="vendor-tabs" id="vendorTabs"></div>
    <div class="search-bar">
      <input type="search" id="searchBox" placeholder="Cari menu..." oninput="renderMenu()">
    </div>
    <div class="custom-box">
      <input type="text" id="customName" placeholder="Nama item custom (tempahan khas)">
      <input type="number" id="customPrice" placeholder="Harga" step="0.5" min="0">
      <button onclick="addCustomItem()">+ Tambah</button>
    </div>
    <div class="cat-tabs" id="catTabs"></div>
    <div class="menu-grid" id="menuGrid"></div>
  </div>

  <!-- CART -->
  <div class="cart-side" id="cartSide">
    <div class="cart-head" id="cartHead" onclick="toggleCart()">
      <span id="cartTitle">TROLI (0)</span>
      <button onclick="event.stopPropagation();kosongkanCart()">Kosongkan</button>
    </div>
    <div class="cart-list" id="cartList">
      <div class="cart-empty">Tekan item menu untuk tambah order</div>
    </div>
    <div class="cart-foot">
      <input type="text" class="meja-input" id="mejaInput" placeholder="No. meja / nama (boleh kosong)">
      <div class="total-line">
        <span class="lbl">JUMLAH</span>
        <span class="amt" id="totalAmt">RM0.00</span>
      </div>
      <button class="btn-hantar" id="btnHantar" onclick="hantarOrder()" disabled>HANTAR ORDER KE DAPUR</button>
      <button id="btnCetakResit" onclick="window.print()">🖨️ Cetak Resit (Order Terakhir)</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<div class="receipt-print" id="receiptPrint"></div>

<script>
/* ============================================================
   ⚙️ CONFIG

   Menu sekarang dimuat DINAMIK dari table Supabase `menu_items`
   (bukan hardcode) — lihat loadMenuFromDB() di bawah. Ni bermakna
   Aliff boleh tambah/edit/padam item guna skrin "Urus Menu" (akaun
   serinian sahaja) tanpa perlu ubah kod terus.
   ============================================================ */

const SUPABASE_URL      = "https://afndxjdgxwhgcczuoeah.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmbmR4amRneHdoZ2NjenVvZWFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzMDIxOTQsImV4cCI6MjA5OTg3ODE5NH0.zWj_4z4kDNvR0NnmP-RDGDIseynFEr_QBgBRT0JWWOE";

let MENU_DATA = []; // diisi oleh loadMenuFromDB() masa startApp()

/* ============================================================ */

/* ============ LOGIN — kata laluan ringkas per akaun ============
   Bukan Supabase Auth sebenar, cuma gate client-side (password
   tersimpan dalam kod, boleh nampak kalau View Source — Aliff dah
   setuju risiko ni sebab nak simple). "serinian" = akaun master,
   boleh tukar antara semua 3 tab vendor. "lamanroti" / "neans"
   = akaun vendor, dikunci hanya pada tab masing-masing. */
const LOGIN_ACCOUNTS = {
  serinian:  { password: "9999", vendor: null },
  lamanroti: { password: "9999", vendor: "Laman Roti" },
  neans:     { password: "9999", vendor: "Neans" }
};
const SESSION_KEY = "sn_pos_session";

function getSession(){
  try{ return JSON.parse(localStorage.getItem(SESSION_KEY)); }
  catch(e){ return null; }
}

function logout(){
  localStorage.removeItem(SESSION_KEY);
  location.reload();
}

function showLoginGate(){
  document.getElementById("loginGate").style.display = "flex";
}
function hideLoginGate(){
  document.getElementById("loginGate").style.display = "none";
}

document.getElementById("loginForm").addEventListener("submit", e => {
  e.preventDefault();
  const u = document.getElementById("loginUser").value.trim().toLowerCase();
  const p = document.getElementById("loginPass").value;
  const acc = LOGIN_ACCOUNTS[u];
  if(!acc || acc.password !== p){
    document.getElementById("loginErr").classList.add("show");
    return;
  }
  localStorage.setItem(SESSION_KEY, JSON.stringify({ user: u, vendor: acc.vendor }));
  hideLoginGate();
  startApp();
});

/* Lazy init — supaya UI tetap render walaupun key belum paste / CDN gagal */
let sb = null;
function getSb(){
  if(sb) return sb;
  if(typeof supabase === "undefined") return null;               // CDN tak load
  if(SUPABASE_URL.indexOf("http") !== 0) return null;            // key belum paste
  try{ sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }
  catch(e){ console.error(e); return null; }
  return sb;
}

let cart = [];          // {name, price, qty}
let activeVendor = "Restoran Seri Nian";
let activeCat = "Semua";
let sending = false;

/* ---------- VENDOR + MENU RENDER ---------- */
function getVendors(){
  const all = [...new Set(MENU_DATA.map(i=>i.vendor))];
  const session = getSession();
  if(session && session.vendor) return [session.vendor]; // akaun vendor: satu tab je
  return all; // akaun master (serinian): semua tab
}

function renderVendorTabs(){
  const el = document.getElementById("vendorTabs");
  el.innerHTML = getVendors().map(v=>
    `<button class="vendor-tab ${v===activeVendor?'active':''}" onclick="setVendor('${v.replace(/'/g,"\\'")}')">${v}</button>`
  ).join("");
}

function setVendor(v){ activeVendor=v; activeCat="Semua"; renderVendorTabs(); renderTabs(); renderMenu(); }

/* ============================================================
   DASHBOARD (dibenamkan terus dalam pos.html — satu fail, satu login)
   Alur kerja sebenar: staff bagitahu order verbal ke vendor -> vendor taip
   dalam POS ni ("Hantar Order ke Dapur", status jadi "baru") -> bila makanan
   dah siap/dihantar ke meja, vendor tekan "Selesai" DALAM DASHBOARD NI (tak
   payah bukak fail lain) -> order jadi status "selesai" dan baru muncul kat
   tab Selesai cashier untuk digabung jadi resit & bayaran.

   Akaun vendor (lamanroti/neans) = dashboard dikunci pada vendor dia sahaja,
   dgn butang Mula Siapkan/Selesai/Batal (macam dashboard.html asal).
   Akaun master (serinian) = mod cashier: papar SEMUA vendor, tab Baru/
   Disiapkan disorok (bukan tanggungjawab cashier), terus default ke tab
   Selesai untuk kutip bayaran + cetak resit gabungan ikut no meja.
   ============================================================ */
let dashOrders = [];
let dashFilter = 'baru';
let dashVendorView = null; // null = mod cashier (semua vendor)
let dashResitByMeja = {};
let dashChannelReady = false;

function dashFmtMasa(ts){
  return new Date(ts).toLocaleTimeString('ms-MY', {hour:'2-digit', minute:'2-digit'});
}

function dashRenderResit(list){
  const board = document.getElementById('dashBoard');
  const byMeja = {};
  list.forEach(o => {
    if(!byMeja[o.meja]) byMeja[o.meja] = [];
    byMeja[o.meja].push(o);
  });
  dashResitByMeja = byMeja;
  const mejaKeys = Object.keys(byMeja);
  if(!mejaKeys.length){
    board.innerHTML = `<div class="dash-empty"><b>Takde resit</b>Order yang selesai akan muncul di sini sebagai resit.</div>`;
    return;
  }
  board.innerHTML = mejaKeys.map(meja => {
    const group = byMeja[meja];
    const grandTotal = group.reduce((s,o)=>s+o.jumlah,0);
    const vendorSections = group.map(o => {
      const itemsHtml = o.items.map(it => `<li><span>${it.qty}× ${it.nama}</span><span>RM${(it.qty*it.harga).toFixed(2)}</span></li>`).join('');
      return `
        <div class="dash-resit-vendor">
          <div class="dash-resit-vendor-name">${o.vendor || 'Restoran Seri Nian'}</div>
          <ul>${itemsHtml}</ul>
          <div class="dash-resit-subtotal"><span>Subjumlah</span><span>RM${o.jumlah.toFixed(2)}</span></div>
        </div>`;
    }).join('');
    return `
      <div class="dash-card selesai resit">
        <div class="dash-card-top">
          <div class="meja">Meja ${meja}</div>
          <div class="masa">RESIT</div>
        </div>
        ${vendorSections}
        <div class="dash-jum grand"><span>Jumlah Keseluruhan</span><span>RM${grandTotal.toFixed(2)}</span></div>
        <div class="dash-actions"><button class="dash-btn-cetak" data-meja="${meja}">🖨️ Cetak Resit</button></div>
      </div>`;
  }).join('');
}

/* Guna #receiptPrint & CSS @media print yang sama dgn buildReceipt() POS */
/* Kod resit rawak (UUID) — bukan senarai ID order berurutan — supaya
   resit.html?code=... tak boleh diteka/dienumerate oleh orang lain.
   Disimpan pada semua row order dalam group ni (kolum resit_code). */
async function dashPrintResit(meja){
  const group = dashResitByMeja[meja];
  if(!group) return;
  const grandTotal = group.reduce((s,o)=>s+o.jumlah,0);
  const masa = new Date().toLocaleString('ms-MY', {dateStyle:'short', timeStyle:'short'});

  const code = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : (Date.now()+'-'+Math.random().toString(36).slice(2));
  const client = getSb();
  if(client){
    const ids = group.map(o=>o.id);
    await client.from('orders').update({resit_code: code}).in('id', ids);
  }
  const dir = location.pathname.replace(/[^/]*$/, ''); // buang segmen terakhir (pos.html/pos/dll), kekal direktori
  const resitUrl = `${location.origin}${dir}resit.html?code=${code}`;
  const qrImg = `https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=${encodeURIComponent(resitUrl)}`;

  const vendorSections = group.map(o => {
    const itemsHtml = o.items.map(it => `
      <tr><td colspan="3">${it.nama}</td></tr>
      <tr>
        <td>${it.qty} x RM${it.harga.toFixed(2)}</td><td></td>
        <td class="r">RM${(it.qty*it.harga).toFixed(2)}</td>
      </tr>`).join('');
    return `<div class="rv-name">${o.vendor || 'Restoran Seri Nian'}</div><table>${itemsHtml}</table><div class="line"></div>`;
  }).join('');
  document.getElementById('receiptPrint').innerHTML = `
    <h2>Restoran Seri Nian</h2>
    <div class="sub">${masa}</div>
    <div class="line"></div>
    <div>Meja/Nama: <b>${meja}</b></div>
    <div class="line"></div>
    ${vendorSections}
    <table><tr><td class="total">JUMLAH</td><td></td><td class="r total">RM${grandTotal.toFixed(2)}</td></tr></table>
    <div class="line"></div>
    <div style="text-align:center">
      <img src="${qrImg}" style="width:100px;height:100px" alt="QR Resit Digital">
      <div style="font-size:9px;margin-top:2px">Scan utk resit digital</div>
    </div>
    <div class="foot">Terima kasih!</div>
  `;
  window.print();
}

function dashRender(){
  const board = document.getElementById('dashBoard');
  const scoped = dashVendorView
    ? dashOrders.filter(o => (o.vendor || 'Restoran Seri Nian') === dashVendorView)
    : dashOrders;
  const list = dashFilter === 'semua' ? scoped : scoped.filter(o => o.status === dashFilter);

  document.getElementById('dcBaru').textContent = scoped.filter(o=>o.status==='baru').length;
  document.getElementById('dcDisiap').textContent = scoped.filter(o=>o.status==='disiapkan').length;
  document.getElementById('dcSelesai').textContent = scoped.filter(o=>o.status==='selesai').length;
  document.getElementById('dcBatal').textContent = scoped.filter(o=>o.status==='batal').length;
  document.getElementById('badgeAktif').textContent = scoped.filter(o=>o.status==='baru'||o.status==='disiapkan').length;

  if(!dashVendorView && dashFilter === 'selesai'){
    dashRenderResit(list);
    return;
  }

  if(!list.length){
    board.innerHTML = `<div class="dash-empty"><b>Takde order</b>Order baru akan muncul kat sini secara live.</div>`;
    return;
  }

  board.innerHTML = list.map(o => {
    const itemsHtml = o.items.map(it => `<li><span>${it.qty}× ${it.nama}</span><span>RM${(it.qty*it.harga).toFixed(2)}</span></li>`).join('');
    let actions = '';
    if(dashVendorView){
      if(o.status === 'baru'){
        actions = `<button class="dash-btn-disiap" data-id="${o.id}" data-s="disiapkan">Mula Siapkan</button><button class="dash-btn-selesai" data-id="${o.id}" data-s="selesai">Selesai</button><button class="dash-btn-batal" data-id="${o.id}" data-s="batal">Batal</button>`;
      } else if(o.status === 'disiapkan'){
        actions = `<button class="dash-btn-selesai" data-id="${o.id}" data-s="selesai">Tandakan Selesai</button><button class="dash-btn-batal" data-id="${o.id}" data-s="batal">Batal</button>`;
      } else if(o.status === 'selesai'){
        actions = `<button class="dash-btn-baru" data-id="${o.id}" data-s="baru">Buka Semula</button>`;
      } else { // batal
        actions = `<button class="dash-btn-baru" data-id="${o.id}" data-s="baru">Buka Semula</button>`;
      }
    }
    return `
      <div class="dash-card ${o.status}">
        <div class="dash-card-top">
          <div class="meja">Meja ${o.meja}</div>
          <div class="masa">
            ${dashFmtMasa(o.created_at)}<br>
            <span class="dash-vbadge">${o.vendor || 'Restoran Seri Nian'}</span>
          </div>
        </div>
        <ul>${itemsHtml}</ul>
        <div class="dash-jum"><span>Jumlah</span><span>RM${o.jumlah.toFixed(2)}</span></div>
        ${actions ? `<div class="dash-actions">${actions}</div>` : ''}
      </div>`;
  }).join('');
}

document.getElementById('dashBoard').addEventListener('click', async e => {
  const cetakBtn = e.target.closest('button.dash-btn-cetak');
  if(cetakBtn){ dashPrintResit(cetakBtn.dataset.meja); return; }

  const btn = e.target.closest('button[data-id]');
  if(!btn) return;
  const { id, s } = btn.dataset;
  btn.disabled = true;
  const client = getSb();
  const { error } = await client.from('orders').update({status: s}).eq('id', id);
  if(error){ console.error(error); toast('Gagal kemaskini order.', true); btn.disabled = false; return; }
  const o = dashOrders.find(x => x.id === id);
  if(o) o.status = s;
  dashRender();
});

document.querySelectorAll('.dash-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    dashFilter = tab.dataset.f;
    dashRender();
  });
});

async function dashLoadInitial(){
  const client = getSb();
  if(!client) return;
  const { data, error } = await client.from('orders')
    .select('*')
    .gte('created_at', new Date(Date.now() - 24*60*60*1000).toISOString())
    .order('created_at', {ascending:false});
  if(error){ console.error(error); return; }
  dashOrders = data;
  dashRender();
}

function toggleDashboard(show){
  document.getElementById('dashboardScreen').classList.toggle('show', show);
  if(!show) return;

  const session = getSession();
  dashVendorView = session && session.vendor ? session.vendor : null;
  document.getElementById('dashTitle').textContent = dashVendorView ? `Dashboard ${dashVendorView}` : 'Dashboard Kaunter — Serinian';

  if(!dashVendorView){
    document.getElementById('dashTabBaru').style.display = 'none';
    document.getElementById('dashTabDisiap').style.display = 'none';
    document.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('.dash-tab[data-f="selesai"]').classList.add('active');
    dashFilter = 'selesai';
  } else {
    document.getElementById('dashTabBaru').style.display = '';
    document.getElementById('dashTabDisiap').style.display = '';
    document.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('.dash-tab[data-f="baru"]').classList.add('active');
    dashFilter = 'baru';
  }

  dashLoadInitial();

  if(!dashChannelReady){
    dashChannelReady = true;
    const client = getSb();
    if(client){
      client.channel('orders-live-dash')
        .on('postgres_changes', {event:'*', schema:'public', table:'orders'}, async () => {
          await dashLoadInitial();
        })
        .subscribe();
    }
  }
}

function getCats(){
  const cats = [...new Set(MENU_DATA.filter(i=>i.vendor===activeVendor).map(i=>i.category))];
  return ["Semua", ...cats];
}

function renderTabs(){
  const el = document.getElementById("catTabs");
  el.innerHTML = getCats().map(c=>
    `<button class="cat-tab ${c===activeCat?'active':''}" onclick="setCat('${c.replace(/'/g,"\\'")}')">${c}</button>`
  ).join("");
}

function setCat(c){ activeCat=c; renderTabs(); renderMenu(); }

function renderMenu(){
  const q = document.getElementById("searchBox").value.trim().toLowerCase();
  let items = MENU_DATA.filter(i=>i.vendor===activeVendor);
  if(activeCat!=="Semua") items = items.filter(i=>i.category===activeCat);
  if(q) items = items.filter(i=>i.name.toLowerCase().includes(q));
  document.getElementById("menuGrid").innerHTML = items.map((i)=>{
    const idx = MENU_DATA.indexOf(i);
    return `<button class="item-btn" onclick="addItem(${idx})">
      <span class="nm">${i.name}</span>
      <span class="pr">RM${i.price.toFixed(2)}</span>
    </button>`;
  }).join("") || `<div class="cart-empty">Takde item padan</div>`;
}

/* ---------- CART ---------- */
function addItem(idx){
  const it = MENU_DATA[idx];
  const found = cart.find(c=>c.name===it.name);
  if(found) found.qty++;
  else cart.push({name:it.name, price:it.price, qty:1});
  renderCart();
  if(window.innerWidth<=720) openCartBrief();
}

/* Item custom — untuk tempahan khas yang takde dalam menu (nama+harga
   bebas taip). Terus masuk troli macam item biasa, ikut vendor tab
   yang aktif masa tu. */
function addCustomItem(){
  const nameEl = document.getElementById("customName");
  const priceEl = document.getElementById("customPrice");
  const name = nameEl.value.trim();
  const price = parseFloat(priceEl.value);
  if(!name || isNaN(price) || price < 0){
    toast("Isi nama & harga item custom dulu.", true);
    return;
  }
  const found = cart.find(c=>c.name===name);
  if(found) found.qty++;
  else cart.push({name, price, qty:1});
  nameEl.value = "";
  priceEl.value = "";
  renderCart();
  if(window.innerWidth<=720) openCartBrief();
}

function ubahQty(i, delta){
  cart[i].qty += delta;
  if(cart[i].qty<=0) cart.splice(i,1);
  renderCart();
}

function kosongkanCart(){
  if(cart.length && !confirm("Kosongkan troli?")) return;
  cart=[]; renderCart();
}

function cartTotal(){ return cart.reduce((s,c)=>s+c.price*c.qty,0); }
function cartCount(){ return cart.reduce((s,c)=>s+c.qty,0); }

function renderCart(){
  const list = document.getElementById("cartList");
  if(!cart.length){
    list.innerHTML = `<div class="cart-empty">Tekan item menu untuk tambah order</div>`;
  } else {
    list.innerHTML = cart.map((c,i)=>`
      <div class="cart-row">
        <div class="info">
          <div class="nm">${c.name}</div>
          <div class="pr">RM${c.price.toFixed(2)}</div>
        </div>
        <div class="qty-ctrl">
          <button onclick="ubahQty(${i},-1)">−</button>
          <span class="q">${c.qty}</span>
          <button onclick="ubahQty(${i},1)">+</button>
        </div>
        <div class="row-total">RM${(c.price*c.qty).toFixed(2)}</div>
      </div>
    `).join("");
  }
  document.getElementById("cartTitle").textContent = `TROLI (${cartCount()})`;
  document.getElementById("totalAmt").textContent = `RM${cartTotal().toFixed(2)}`;
  document.getElementById("btnHantar").disabled = !cart.length || sending;
}

/* ---------- SUBMIT ORDER ---------- */
/* Resit dibina dari payload YANG BARU DIHANTAR (bukan cart, sebab cart
   dikosongkan lepas hantar). Cetak guna window.print() + CSS @media
   print — berfungsi dgn printer thermal yang install macam printer
   biasa (USB/Bluetooth), takde protokol raw diperlukan. */
function buildReceipt(payload){
  const masa = new Date().toLocaleString('ms-MY', {dateStyle:'short', timeStyle:'short'});
  const itemsHtml = payload.items.map(it => `
    <tr>
      <td colspan="3">${it.nama}</td>
    </tr>
    <tr>
      <td>${it.qty} x RM${it.harga.toFixed(2)}</td>
      <td></td>
      <td class="r">RM${(it.qty*it.harga).toFixed(2)}</td>
    </tr>
  `).join('');
  document.getElementById('receiptPrint').innerHTML = `
    <h2>${payload.vendor}</h2>
    <div class="sub">Restoran Seri Nian<br>${masa}</div>
    <div class="line"></div>
    <div>Meja/Nama: <b>${payload.meja}</b></div>
    <div class="line"></div>
    <table>${itemsHtml}</table>
    <div class="line"></div>
    <table><tr><td class="total">JUMLAH</td><td></td><td class="r total">RM${payload.jumlah.toFixed(2)}</td></tr></table>
    <div class="foot">Terima kasih!</div>
  `;
  document.getElementById('btnCetakResit').classList.add('show');
}

async function hantarOrder(){
  if(!cart.length || sending) return;
  sending = true;
  document.getElementById("btnHantar").disabled = true;
  document.getElementById("btnHantar").textContent = "MENGHANTAR...";
  document.getElementById("retryBar").classList.remove("show");

  const meja = document.getElementById("mejaInput").value.trim() || "Kaunter";

  /* NOTA SCHEMA: payload ni disamakan dgn order.html supaya dashboard.html
     boleh papar order POS tanpa ubah apa-apa kat dashboard:
       meja  (bukan table_no) — order.html hantar parseInt(meja)||0, tapi POS
             kaunter boleh terima nama/label bukan nombor juga, jadi hantar
             raw string terus (Postgres text column terima kedua-dua).
       items — {nama, harga, qty} (bukan {name, price, qty}), sepadan dgn
             cara dashboard.html baca o.items[].nama / .harga / .qty.
       jumlah (bukan total) — sepadan dgn o.jumlah dalam dashboard.html.
       status "baru" — sama value macam order.html & tab default dashboard.
       source: "pos" — tambahan untuk bezakan asal order kaunter vs QR meja.
       vendor — tab vendor yang aktif masa order dihantar (Restoran Seri Nian /
             Laman Roti / Neans). Dashboard papar label ni supaya kaunter tahu
             order tu dari vendor mana bila kutip bayaran ikut no meja. */
  const payload = {
    meja: meja,
    items: cart.map(c=>({nama:c.name, harga:c.price, qty:c.qty})),
    jumlah: cartTotal(),
    status: "baru",
    source: "pos",
    vendor: activeVendor
  };

  try{
    const client = getSb();
    if(!client) throw new Error("Supabase belum setup — paste URL & key kat CONFIG dulu");
    const { error } = await client.from("orders").insert(payload);
    if(error) throw error;
    toast(`✅ Order masuk dapur (${meja})`);
    buildReceipt(payload);
    dashLoadInitial();
    cart=[];
    document.getElementById("mejaInput").value="";
    renderCart();
    closeCart();
  }catch(e){
    console.error(e);
    toast("Order gagal. Cuba lagi.", true);
    document.getElementById("retryBar").classList.add("show");
  }finally{
    sending=false;
    document.getElementById("btnHantar").textContent = "HANTAR ORDER KE DAPUR";
    renderCart();
  }
}

/* ---------- UI HELPERS ---------- */
let toastTimer;
function toast(msg, isErr){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show" + (isErr?" err":"");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"), 2600);
}

function toggleCart(){
  if(window.innerWidth>720) return;
  document.getElementById("cartSide").classList.toggle("open");
}
function openCartBrief(){ /* flash cart head so cashier nampak item masuk */
  const t = document.getElementById("cartTitle");
  t.style.transition="none"; t.style.opacity=".4";
  requestAnimationFrame(()=>{ t.style.transition="opacity .3s"; t.style.opacity="1"; });
}
function closeCart(){
  document.getElementById("cartSide").classList.remove("open");
}

/* ---------- NETWORK DOT ---------- */
function updateNet(){
  document.getElementById("netDot").classList.toggle("offline", !navigator.onLine);
}
window.addEventListener("online", updateNet);
window.addEventListener("offline", updateNet);

/* ---------- MENU DATA (Supabase) ---------- */
async function loadMenuFromDB(){
  const client = getSb();
  if(!client) return;
  const { data, error } = await client.from("menu_items")
    .select("id,name,price,category,vendor")
    .eq("active", true)
    .order("id");
  if(error){ console.error(error); return; }
  MENU_DATA = data;
}

/* ---------- INIT ---------- */
async function startApp(){
  const session = getSession();
  if(session && session.vendor) activeVendor = session.vendor; // akaun vendor terkunci
  if(session && session.vendor === null) document.getElementById("linkUrusMenu").style.display = "inline-block";
  dashVendorView = session && session.vendor ? session.vendor : null;
  await loadMenuFromDB();
  renderVendorTabs();
  renderTabs();
  renderMenu();
  renderCart();
  updateNet();
  await dashLoadInitial(); // supaya badge Dashboard kat header betul dari awal, walaupun screen tak dibuka

  // Menu berubah (admin tambah/edit/padam) — refresh terus tanpa reload
  const client = getSb();
  if(client){
    client.channel("menu-live")
      .on("postgres_changes", {event:"*", schema:"public", table:"menu_items"}, async () => {
        await loadMenuFromDB();
        renderVendorTabs(); renderTabs(); renderMenu();
      })
      .subscribe();

    // Order live — badge Dashboard & board refresh terus tanpa reload
    client.channel("orders-live-pos")
      .on("postgres_changes", {event:"*", schema:"public", table:"orders"}, async () => {
        await dashLoadInitial();
      })
      .subscribe();
    dashChannelReady = true;
  }
}

const existingSession = getSession();
if(existingSession){
  hideLoginGate();
  startApp();
} else {
  showLoginGate();
}
</script>
